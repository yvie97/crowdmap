<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时人数检测系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; text-align: center; color: #333; }
        h1 { color: #2c3e50; }
        .video-container { margin: 20px 0; padding: 20px; border: 2px dashed #bdc3c7; border-radius: 10px; background-color: #f9f9f9; }
        .stats-container { display: flex; justify-content: space-around; margin: 30px 0; }
        .stat-box { padding: 20px; border: 1px solid #ecf0f1; border-radius: 10px; width: 40%; background-color: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .count-number { font-size: 4em; font-weight: bold; margin: 10px 0; color: #e74c3c; }
        .chart-container { margin-top: 40px; padding: 20px; border: 1px solid #ecf0f1; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <h1>📷 实时人数检测系统</h1>

    <div class="video-container">
        <h2>监控画面</h2>
        <img id="video-stream" src="http://localhost:8000/video_feed" alt="等待后端视频流接入..." width="640" height="480" style="background-color: #eaeaea;">
    </div>

    <div class="stats-container">
        <div class="stat-box">
            <h3>当前识别到的人数</h3>
            <p class="count-number" id="current-count">0</p>
        </div>
        <div class="stat-box">
            <h3>系统状态</h3>
            <p id="system-status" style="color: #7f8c8d; font-size: 1.2em; margin-top: 30px;">🔴 离线 (等待后端启动)</p>
        </div>
    </div>

    <div class="chart-container">
        <h2>历史人数趋势</h2>
        <canvas id="history-chart" width="400" height="150"></canvas>
    </div>

    <script>
        /* 1. 初始化 Chart.js 折线图 */
        const ctx = document.getElementById('history-chart').getContext('2d');
        const historyChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], /* X轴：时间标签 */
                datasets: [{
                    label: '实时人数',
                    data: [], /* Y轴：人数数据 */
                    borderColor: '#3498db',
                    backgroundColor: 'rgba(52, 152, 219, 0.2)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4 /* 让线条平滑弯曲 */
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true, suggestedMax: 10 }
                }
            }
        });

        /* 2. 模拟数据引擎：每 2 秒钟自动执行一次 */
       /* 2. 真实数据引擎：每 2 秒钟向后端拉取一次数据 */
        setInterval(async () => {
            try {
                // 向 FastAPI 接口发送请求
                const response = await fetch('http://localhost:8000/api/current_count');
                const data = await response.json();
                
                // 拿到真实的 ROI 人数
                const realCount = data.count;
                
                const now = new Date();
                const timeString = now.toLocaleTimeString();

                /* 动作 A：更新页面上的文字和状态 */
                document.getElementById('current-count').innerText = realCount;
                document.getElementById('system-status').innerText = '🟢 在线 (摄像头正常运行)';
                document.getElementById('system-status').style.color = '#2ecc71';

                /* 动作 B：更新折线图 */
                historyChart.data.labels.push(timeString);
                historyChart.data.datasets[0].data.push(realCount);

                if (historyChart.data.labels.length > 10) {
                    historyChart.data.labels.shift();
                    historyChart.data.datasets[0].data.shift();
                }
                historyChart.update();

            } catch (error) {
                // 如果请求失败（比如后端没开），显示报错状态
                console.error("无法连接到后端服务器", error);
                document.getElementById('system-status').innerText = '🔴 离线 (后端未启动或连接断开)';
                document.getElementById('system-status').style.color = '#e74c3c';
            }
        }, 2000);
