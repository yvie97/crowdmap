services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mock-cv:
    build: ./cv
    ports:
      - "8001:8001"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - CV_SERVER_URL=http://mock-cv:8001/api/current_count
    depends_on:
      - redis
      - mock-cv
